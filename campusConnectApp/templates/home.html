<!DOCTYPE html>
{%extends "base.html"%}
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect Dashboard</title>
    <style> 
    .card-tile{
        transition: transform .18s ease, box-shadow .18s ease;
        border-radius: .5rem;
    }
    .card-tile:hover{ transform: translateY(-6px); box-shadow: 0 18px 40px rgba(0,0,0,.12); }
    .card-tile:focus{ outline: 3px solid rgba(59,130,246,.15); }
    </style>
</head>
{%block content%}
{%include 'navbar.html' %}
<header>
    <hr width="100%" size="2">
    <h4>Dashboard</h4>
    
</header>
<body>

    <h6>
        Welcome back, student!
    </h6>
    <div class="container">
        <div class="row">
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div role="button" tabindex="0" class="card card-tile border shadow-sm mx-auto my-3" style="width:300px;min-height: 150px" onclick="location.href='/tasks/';" onkeypress="if(event.key==='Enter') location.href='/tasks/';">
                    <div class="row g-0 align-items-center">
                        <div class="col">
                            <div class="card-body py-3">
                                <h5 class="card-title mb-1">Weekly Tasks</h5>
                                <p class="card-text text-muted mb-1">To-Do:</p>
                                <p class="card-text text-secondary small">Task • Due Date • Description</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-4 mb-3">
                <div role="button" tabindex="0" class="card card-tile border shadow-sm mx-auto my-3" style="width:300px;min-height: 150px" onclick="location.href='/events/';" onkeypress="if(event.key==='Enter') location.href='/events/';">
                    <div class="row g-0 align-items-center">
                        <div class="col">
                            <div class="card-body py-3">
                                <h5 class="card-title mb-1">Campus Events</h5>
                                <p class="card-text text-muted mb-1">Event Title</p>
                                <p class="card-text text-secondary small">Category • Date • Description</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>    

</body>

{%endblock%}
</html>
