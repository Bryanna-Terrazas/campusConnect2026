<!DOCTYPE html>
{%extends "base.html"%}
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect Register</title>
    <style> 
        body{backg}
    </style>
</head>


{%block content%}
<header>
    <hr width="100%" size="2">
    <h4 style="text-align:border-left;margin-left:12px;color:darkblue;font_family:sans-serif;">Register New Account</h4>
    
</header>


<form method="post" style="text-align:border-left;margin-left:12px;font_family:sans-serif;">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Create account</button>
</form>

<a href="{% url 'login' %}" style="text-align:border-left;margin-left:12px;font_family:sans-serif;">Login</a>
{%endblock%}
