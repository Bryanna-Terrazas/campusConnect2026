<!DOCTYPE html>
{%extends "base.html"%}
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Connect Login</title>
    <style> 
        body{backg}
    </style>
</head>


{%block content%}
<header>
    <hr width="100%" size="2">
    <h3 style="text-align:border-left;margin-left:12px;color:darkblue;font_family:sans-serif;">Login</h3>
    
</header>

<form method="post" style="text-align:border-left;margin-left:12px;font_family:sans-serif;">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Login</button>
</form>

<a href="{% url 'register' %}" style="text-align:border-left;margin-left:12px;font_family:sans-serif;">Register</a>

{%endblock%}
